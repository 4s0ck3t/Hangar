name: Build Windows executable

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install Flask>=3.0 Pillow>=10.0 "zstandard>=0.21" pyinstaller>=6.0
          pip install trimesh>=4.0 numpy>=1.24 imageio>=2.30 "OpenEXR>=3.4" pyopengl>=3.1

      - name: Fetch WebView2 Evergreen bootstrapper (~2 MB)
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://go.microsoft.com/fwlink/p/?LinkId=2124703" `
            -OutFile MicrosoftEdgeWebview2Setup.exe
          Get-Item MicrosoftEdgeWebview2Setup.exe | Select-Object Name,Length

      - name: Write Windows version resource (reduces AV false-positives)
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}" -replace '^v',''
          if ($ver -notmatch '^\d+\.\d+\.\d+') { $ver = '0.0.0' }
          $p = $ver.Split('.')
          $fv = "$($p[0]),$($p[1]),$($p[2]),0"
          $lines = @(
            "VSVersionInfo(",
            "  ffi=FixedFileInfo(filevers=($fv), prodvers=($fv), mask=0x3f, flags=0x0, OS=0x40004, fileType=0x1, subtype=0x0, date=(0,0)),",
            "  kids=[",
            "    StringFileInfo([StringTable('040904B0', [",
            "      StringStruct('CompanyName','4s0ck3t'),",
            "      StringStruct('FileDescription','Hangar - local-first 3D asset manager'),",
            "      StringStruct('FileVersion','$ver'),",
            "      StringStruct('InternalName','Hangar'),",
            "      StringStruct('OriginalFilename','Hangar.exe'),",
            "      StringStruct('ProductName','Hangar'),",
            "      StringStruct('ProductVersion','$ver'),",
            "      StringStruct('LegalCopyright','(c) 4s0ck3t')])]),",
            "    VarFileInfo([VarStruct('Translation',[1033,1200])])",
            "  ]",
            ")"
          )
          Set-Content -Path version.txt -Value $lines -Encoding ascii
          Get-Content version.txt

      - name: Build Hangar (onedir — fewer AV false-positives than onefile)
        run: >
          pyinstaller --noconsole --name Hangar --noupx
          --version-file version.txt
          --icon hangar.ico
          --add-data "hangar.ico;."
          --add-data "static;static"
          --add-data "MicrosoftEdgeWebview2Setup.exe;."
          --add-data "worker_main.py;."
          --add-data "worker.py;."
          --add-data "store.py;."
          --add-data "thumbs.py;."
          --add-data "scanner.py;."
          --collect-all trimesh
          --collect-all zstandard
          --hidden-import imageio
          --hidden-import numpy
          --hidden-import OpenEXR
          --hidden-import Imath
          --hidden-import worker
          --exclude-module cv2
          --exclude-module webview
          --exclude-module pythonnet
          --exclude-module clr
          --exclude-module clr_loader
          --exclude-module tkinter
          --exclude-module _tkinter
          desktop.py

      - name: Self-test native webview (diagnostic — never fails the build)
        continue-on-error: true
        shell: pwsh
        run: |
          $exe = "dist/Hangar/Hangar.exe"
          $proc = Start-Process -FilePath $exe -ArgumentList "--selftest" -Wait -PassThru
          Write-Host "selftest exit code: $($proc.ExitCode)"
          $log = Join-Path $env:TEMP "hangar_selftest.txt"
          if (Test-Path $log) {
            Write-Host "----- selftest result -----"
            Get-Content $log
          } else {
            Write-Host "no selftest file produced (exe may have crashed before writing it)"
          }

      - name: Compute runtime signature (identifies the heavy _internal payload)
        shell: pwsh
        run: |
          # The "runtime" is everything in _internal except our own source (.py) and
          # static/ (the UI) -- i.e. the Python interpreter, numpy/trimesh/Pillow/
          # OpenEXR/cryptography/tcl-tk and friends. That payload is what makes minor
          # updates huge even though it almost never changes between releases. This
          # signature is a hash of exactly the installed package versions that produce
          # it, so the updater can tell "did the runtime actually change" and skip
          # re-downloading it when it didn't.
          pip freeze > runtime-freeze.txt
          $py = @(
            "import hashlib, platform, PyInstaller",
            "with open('runtime-freeze.txt', 'rb') as f:",
            "    freeze = f.read()",
            "basis = platform.python_version().encode() + b'|' + PyInstaller.__version__.encode() + b'|' + freeze",
            "sig = hashlib.sha256(basis).hexdigest()[:16]",
            "with open('dist/Hangar/_internal/runtime_sig.txt', 'w') as f:",
            "    f.write(sig)",
            "print('runtime_sig', sig)"
          )
          Set-Content -Path runtimesig.py -Value $py -Encoding ascii
          python runtimesig.py
          $sig = Get-Content dist/Hangar/_internal/runtime_sig.txt
          "RUNTIME_SIG=$sig" | Out-File -FilePath $env:GITHUB_ENV -Encoding ascii -Append

      - name: Zip the build folder (clean forward-slash paths for the in-app updater)
        shell: pwsh
        run: |
          # PowerShell's Compress-Archive writes non-standard zip entries (backslash
          # separators / odd paths) that the in-app updater's safe-extract guard can
          # reject with "unsafe path". Build the zip with Python's zipfile instead so
          # every entry is a clean forward-slash path relative to the Hangar folder.
          $py = @(
            "import os, zipfile",
            "root = 'dist/Hangar'",
            "z = zipfile.ZipFile('dist/Hangar-windows.zip', 'w', zipfile.ZIP_DEFLATED)",
            "for dp, _, files in os.walk(root):",
            "    for f in files:",
            "        full = os.path.join(dp, f)",
            "        z.write(full, os.path.relpath(full, root).replace(os.sep, '/'))",
            "z.close()",
            "print('zipped', os.path.getsize('dist/Hangar-windows.zip'), 'bytes')"
          )
          Set-Content -Path zipit.py -Value $py -Encoding ascii
          python zipit.py

      - name: Zip the small app-only package (Hangar.exe + our code + static + icon)
        shell: pwsh
        run: |
          # This is everything that changes on a normal Hangar release: the exe
          # (carries our compiled code), the loose .py files the Blender subprocess /
          # render-farm worker need on disk, the web UI, and the icon. It excludes the
          # heavy runtime (_internal minus these), which almost never changes between
          # releases. The updater downloads only this when the runtime signature on
          # the running install matches the release's, instead of the full ~tens-of-MB
          # package, for every minor update.
          #
          # NAMING IS LOAD-BEARING: pre-0.15 updaters pick "any .zip whose name
          # contains 'windows'" as the full package — a name like
          # Hangar-windows-app.zip gets downloaded by them as if it were a full
          # standalone build, which then dies at launch with a missing-python-DLL
          # error (this actually happened on 0.14.36 -> 0.15.0). The delta asset
          # must therefore NEVER contain "windows" in its filename; new updaters
          # find it via update-manifest.json's app_asset field, not by name.
          $py = @(
            "import os, zipfile",
            "root = 'dist/Hangar'",
            "app_py_files = ['store.py', 'thumbs.py', 'scanner.py', 'worker.py', 'worker_main.py']",
            "z = zipfile.ZipFile('dist/Hangar-app-update.zip', 'w', zipfile.ZIP_DEFLATED)",
            "z.write(os.path.join(root, 'Hangar.exe'), 'Hangar.exe')",
            "for name in app_py_files:",
            "    full = os.path.join(root, '_internal', name)",
            "    if os.path.exists(full):",
            "        z.write(full, '_internal/' + name)",
            "static_root = os.path.join(root, '_internal', 'static')",
            "for dp, _, files in os.walk(static_root):",
            "    for f in files:",
            "        full = os.path.join(dp, f)",
            "        z.write(full, os.path.relpath(full, root).replace(os.sep, '/'))",
            "z.close()",
            "print('zipped app package', os.path.getsize('dist/Hangar-app-update.zip'), 'bytes')"
          )
          Set-Content -Path zipapp.py -Value $py -Encoding ascii
          python zipapp.py

      - name: Write update manifest
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}" -replace '^v',''
          $fullSize = (Get-Item dist/Hangar-windows.zip).Length
          $appSize = (Get-Item dist/Hangar-app-update.zip).Length
          $manifest = @{
            version = $ver
            runtime_sig = "${{ env.RUNTIME_SIG }}"
            full_asset = "Hangar-windows.zip"
            full_size = $fullSize
            app_asset = "Hangar-app-update.zip"
            app_size = $appSize
          }
          $manifest | ConvertTo-Json | Set-Content -Path dist/update-manifest.json -Encoding utf8
          Get-Content dist/update-manifest.json

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Hangar-windows
          path: |
            dist/Hangar-windows.zip
            dist/Hangar-app-update.zip
            dist/update-manifest.json

      - name: Attach to release (tag builds only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Hangar-windows.zip
            dist/Hangar-app-update.zip
            dist/update-manifest.json
          name: Hangar ${{ github.ref_name }}
          body: |
            Standalone Windows build of Hangar (PyInstaller --onedir, zipped).
            Onedir is used instead of onefile because single-file exes trip
            Windows Defender false-positives.

            To run:
            1. Download `Hangar-windows.zip`.
            2. Right-click the zip > Properties > tick **Unblock** > OK (clears Mark-of-the-Web).
            3. Extract it, open the `Hangar` folder, run **Hangar.exe**.

            Requires the Edge WebView2 runtime (default on Windows 10/11).
            Data is stored in `%USERPROFILE%\.hangar`.

            Hangar's in-app updater downloads `Hangar-app-update.zip` instead of
            the full package whenever the runtime hasn't changed since your
            installed version — most releases only touch app code, so most
            updates are a few MB instead of the full download.

            **Windows Defender false positive:** Defender's ML heuristic
            (e.g. `Wacatac.C!ml`) flags unsigned PyInstaller apps like this one —
            it is a false positive, not malware. The build is `--onedir`, UPX-free
            and now carries a version resource to reduce it. If flagged, restore
            the file from Protection history and/or add the `Hangar` folder to
            Defender's exclusions. A code-signed build is the permanent fix.
