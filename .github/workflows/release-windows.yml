name: Build Windows executable

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build deps (core only — optional deps degrade gracefully)
        run: |
          python -m pip install --upgrade pip
          pip install Flask>=3.0 Pillow>=10.0 pywebview>=5.0 pyinstaller>=6.0

      - name: Build Hangar.exe
        run: >
          pyinstaller --noconsole --onefile --name Hangar
          --add-data "static;static"
          --collect-all webview
          desktop.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Hangar-windows
          path: dist/Hangar.exe

      - name: Attach to release (tag builds only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Hangar.exe
          name: Hangar ${{ github.ref_name }}
          body: |
            Standalone Windows build of Hangar (`Hangar.exe`, PyInstaller --onefile).
            Requires the Edge WebView2 runtime (default on Windows 10/11).
            Double-click to launch; data is stored in `%USERPROFILE%\.hangar`.
