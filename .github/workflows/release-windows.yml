name: Build Windows executable

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install Flask>=3.0 Pillow>=10.0 "zstandard>=0.21" pyinstaller>=6.0
          pip install trimesh>=4.0 numpy>=1.24 imageio>=2.30 "OpenEXR>=3.4" pyopengl>=3.1

      - name: Fetch WebView2 Evergreen bootstrapper (~2 MB)
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://go.microsoft.com/fwlink/p/?LinkId=2124703" `
            -OutFile MicrosoftEdgeWebview2Setup.exe
          Get-Item MicrosoftEdgeWebview2Setup.exe | Select-Object Name,Length

      - name: Write Windows version resource (reduces AV false-positives)
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}" -replace '^v',''
          if ($ver -notmatch '^\d+\.\d+\.\d+') { $ver = '0.0.0' }
          $p = $ver.Split('.')
          $fv = "$($p[0]),$($p[1]),$($p[2]),0"
          $lines = @(
            "VSVersionInfo(",
            "  ffi=FixedFileInfo(filevers=($fv), prodvers=($fv), mask=0x3f, flags=0x0, OS=0x40004, fileType=0x1, subtype=0x0, date=(0,0)),",
            "  kids=[",
            "    StringFileInfo([StringTable('040904B0', [",
            "      StringStruct('CompanyName','4s0ck3t'),",
            "      StringStruct('FileDescription','Hangar - local-first 3D asset manager'),",
            "      StringStruct('FileVersion','$ver'),",
            "      StringStruct('InternalName','Hangar'),",
            "      StringStruct('OriginalFilename','Hangar.exe'),",
            "      StringStruct('ProductName','Hangar'),",
            "      StringStruct('ProductVersion','$ver'),",
            "      StringStruct('LegalCopyright','(c) 4s0ck3t')])]),",
            "    VarFileInfo([VarStruct('Translation',[1033,1200])])",
            "  ]",
            ")"
          )
          Set-Content -Path version.txt -Value $lines -Encoding ascii
          Get-Content version.txt

      - name: Build Hangar (onedir — fewer AV false-positives than onefile)
        run: >
          pyinstaller --noconsole --name Hangar --noupx
          --version-file version.txt
          --icon hangar.ico
          --add-data "static;static"
          --add-data "MicrosoftEdgeWebview2Setup.exe;."
          --add-data "worker_main.py;."
          --add-data "worker.py;."
          --add-data "store.py;."
          --add-data "thumbs.py;."
          --add-data "scanner.py;."
          --collect-all trimesh
          --collect-all zstandard
          --hidden-import imageio
          --hidden-import numpy
          --hidden-import OpenEXR
          --hidden-import Imath
          --hidden-import worker
          --exclude-module cv2
          --exclude-module webview
          --exclude-module pythonnet
          --exclude-module clr
          --exclude-module clr_loader
          desktop.py

      - name: Self-test native webview (diagnostic — never fails the build)
        continue-on-error: true
        shell: pwsh
        run: |
          $exe = "dist/Hangar/Hangar.exe"
          $proc = Start-Process -FilePath $exe -ArgumentList "--selftest" -Wait -PassThru
          Write-Host "selftest exit code: $($proc.ExitCode)"
          $log = Join-Path $env:TEMP "hangar_selftest.txt"
          if (Test-Path $log) {
            Write-Host "----- selftest result -----"
            Get-Content $log
          } else {
            Write-Host "no selftest file produced (exe may have crashed before writing it)"
          }

      - name: Zip the build folder
        run: Compress-Archive -Path dist/Hangar/* -DestinationPath dist/Hangar-windows.zip
        shell: pwsh

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Hangar-windows
          path: dist/Hangar-windows.zip

      - name: Attach to release (tag builds only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Hangar-windows.zip
          name: Hangar ${{ github.ref_name }}
          body: |
            Standalone Windows build of Hangar (PyInstaller --onedir, zipped).
            Onedir is used instead of onefile because single-file exes trip
            Windows Defender false-positives.

            To run:
            1. Download `Hangar-windows.zip`.
            2. Right-click the zip > Properties > tick **Unblock** > OK (clears Mark-of-the-Web).
            3. Extract it, open the `Hangar` folder, run **Hangar.exe**.

            Requires the Edge WebView2 runtime (default on Windows 10/11).
            Data is stored in `%USERPROFILE%\.hangar`.

            **Windows Defender false positive:** Defender's ML heuristic
            (e.g. `Wacatac.C!ml`) flags unsigned PyInstaller apps like this one —
            it is a false positive, not malware. The build is `--onedir`, UPX-free
            and now carries a version resource to reduce it. If flagged, restore
            the file from Protection history and/or add the `Hangar` folder to
            Defender's exclusions. A code-signed build is the permanent fix.
