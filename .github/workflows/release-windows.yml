name: Build Windows executable

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install Flask>=3.0 Pillow>=10.0 pyinstaller>=6.0
          pip install "pywebview>=5.0" "pythonnet>=3.0.4"
          pip install trimesh>=4.0 numpy>=1.24 imageio>=2.30 pyopengl>=3.1
          pip install opencv-python-headless>=4.8

      - name: Build Hangar (onedir — fewer AV false-positives than onefile)
        run: >
          pyinstaller --noconsole --name Hangar
          --icon hangar.ico
          --add-data "static;static"
          --collect-all webview
          --collect-all pythonnet
          --collect-all clr_loader
          --collect-all trimesh
          --collect-all cv2
          --hidden-import clr
          --hidden-import imageio
          --hidden-import numpy
          desktop.py

      - name: Self-test native webview (diagnostic — never fails the build)
        continue-on-error: true
        shell: pwsh
        run: |
          $exe = "dist/Hangar/Hangar.exe"
          $proc = Start-Process -FilePath $exe -ArgumentList "--selftest" -Wait -PassThru
          Write-Host "selftest exit code: $($proc.ExitCode)"
          $log = Join-Path $env:TEMP "hangar_selftest.txt"
          if (Test-Path $log) {
            Write-Host "----- selftest result -----"
            Get-Content $log
          } else {
            Write-Host "no selftest file produced (exe may have crashed before writing it)"
          }

      - name: Zip the build folder
        run: Compress-Archive -Path dist/Hangar/* -DestinationPath dist/Hangar-windows.zip
        shell: pwsh

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Hangar-windows
          path: dist/Hangar-windows.zip

      - name: Attach to release (tag builds only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Hangar-windows.zip
          name: Hangar ${{ github.ref_name }}
          body: |
            Standalone Windows build of Hangar (PyInstaller --onedir, zipped).
            Onedir is used instead of onefile because single-file exes trip
            Windows Defender false-positives.

            To run:
            1. Download `Hangar-windows.zip`.
            2. Right-click the zip > Properties > tick **Unblock** > OK (clears Mark-of-the-Web).
            3. Extract it, open the `Hangar` folder, run **Hangar.exe**.

            Requires the Edge WebView2 runtime (default on Windows 10/11).
            Data is stored in `%USERPROFILE%\.hangar`.
